<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Munecos Kawaii</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
</head>
<body>

<!-- ====== HEADER ====== -->
<header>
  <h1>&#10024; Mu&#241;ecos Kawaii</h1>
  <div class="slots" id="slots">
    <!-- Slot tabs generated by JS -->
  </div>
  <button class="btn-save" id="btn-save">Guardar PNG</button>
  <button class="btn-share" id="btn-share">Compartir &#128279;</button>
</header>

<!-- ====== MAIN ====== -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel-left" id="left-panel">
    <!-- Sections built by JS -->
  </div>

  <!-- CENTER CANVAS -->
  <div class="canvas-area">
    <div class="canvas-bg"></div>
    <div class="doll-wrap" id="doll-wrap">
      <div id="doll-layers"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">

    <h3>Nombre</h3>
    <input
      type="text"
      class="name-input"
      id="doll-name"
      placeholder="Nombre del mu&#241;eco"
      maxlength="24"
    />

    <h3>G&#233;nero</h3>
    <div class="gender-btns">
      <button class="gender-btn active" data-gender="boy">
        <span class="g-icon">&#9794;</span>
        Ni&#241;o
      </button>
      <button class="gender-btn" data-gender="girl">
        <span class="g-icon">&#9792;</span>
        Ni&#241;a
      </button>
    </div>

    <h3>Color de piel</h3>
    <div class="skin-picker">
      <div class="skin-swatch active" data-color="#fde8d0" style="background:#fde8d0;" title="Clara"></div>
      <div class="skin-swatch" data-color="#f5c5a3" style="background:#f5c5a3;" title="Media-clara"></div>
      <div class="skin-swatch" data-color="#e8a87c" style="background:#e8a87c;" title="Media"></div>
      <div class="skin-swatch" data-color="#c68642" style="background:#c68642;" title="Morena"></div>
      <div class="skin-swatch" data-color="#8d5524" style="background:#8d5524;" title="Oscura"></div>
      <div class="skin-swatch" data-color="#5c3317" style="background:#5c3317;" title="Muy oscura"></div>
      <div class="skin-swatch" data-color="#ffe0f0" style="background:#ffe0f0;" title="Rosa kawaii"></div>
      <div class="skin-swatch" data-color="#b8f0e0" style="background:#b8f0e0;" title="Menta kawaii"></div>
    </div>
    <div class="skin-custom-row">
      <label for="skin-custom">Personalizado</label>
      <input type="color" id="skin-custom" value="#f5c5a3"/>
    </div>

    <h3>Color de fondo</h3>
    <div class="color-row">
      <label>Fondo</label>
      <input type="color" id="bg-color" value="#1a2a4a"/>
    </div>

    <button class="btn-reset" id="btn-reset">&#128465; Resetear mu&#241;eco</button>

  </div><!-- /panel-right -->

</div><!-- /main -->

<!-- ====== FOOTER ====== -->
<div class="footer-bar">
  <span class="footer-version">v1.6.3</span>
  <span class="footer-sep">·</span>
  <a href="https://github.com/davic80/munecos-kawaii"
     target="_blank" rel="noopener" class="footer-link">GitHub</a>
  <span class="footer-sep">·</span>
  <a href="https://www.paypal.com/donate/?hosted_button_id=7Z6JDTBCDCWHC"
     target="_blank" rel="noopener" class="footer-donate">invite me to a coffee ☕</a>
</div>

<script src="/static/app.js"></script>
</body>
</html>
