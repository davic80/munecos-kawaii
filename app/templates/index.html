<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Munecos Kawaii</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
</head>
<body>

<!-- ====== HEADER ====== -->
<header>
  <h1>&#10024; Mu&#241;ecos Kawaii</h1>
  <div class="slots" id="slots">
    <!-- Slot tabs generated by JS -->
  </div>
  <button class="btn-save" id="btn-save">&#129485; Guardar</button>
  <button class="btn-scene-save" id="btn-scene-save">&#127749; Escena</button>
  <button class="btn-share" id="btn-share">Compartir &#128279;</button>
  <button class="btn-mute" id="btn-mute" aria-label="Silenciar música">&#127925;</button>
  <!-- Mobile hamburger (bottom sheet toggle) -->
  <button class="btn-hamburger" id="btn-hamburger" aria-label="Abrir panel">&#9776;</button>
  <!-- Mobile action menu -->
  <button class="btn-action-menu" id="btn-action-menu" aria-label="Acciones">&#8942;</button>
  <div class="action-menu-popup" id="action-menu-popup">
    <button class="action-menu-item" id="mob-random">&#127922; Sorpresa</button>
    <button class="action-menu-item" id="mob-save">&#129485; Guardar PNG</button>
    <button class="action-menu-item" id="mob-scene-save">&#127749; Escena PNG</button>
    <button class="action-menu-item" id="mob-share">&#128279; Compartir</button>
    <button class="action-menu-item" id="mob-mute">&#127925; Música: ON</button>
  </div>
</header>

<!-- ====== MAIN ====== -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel-left" id="left-panel">
    <!-- Sections built by JS -->
  </div>

  <!-- CENTER CANVAS -->
  <div class="canvas-area">
    <div class="canvas-bg"></div>
    <div id="bg-scene-layer"></div>
    <div id="scene-dolls">
      <!-- doll-wrap elements created dynamically by JS -->
    </div>
    <div class="scene-drop-hint" id="scene-drop-hint">Arrastra un mu&#241;eco aqu&#237;</div>
    <div class="scene-trash-zone" id="scene-trash-zone">&#128465;&#65039; Quitar de escena</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">

    <h3>Nombre</h3>
    <input
      type="text"
      class="name-input"
      id="doll-name"
      placeholder="Nombre del mu&#241;eco"
      maxlength="24"
    />

    <h3>Tamaño del muñeco</h3>
    <div class="scale-row">
      <span class="scale-icon">⤢</span>
      <input type="range" min="-50" max="50" step="1" value="0" id="doll-scale-input"/>
      <span class="scale-val" id="doll-scale-val">0%</span>
    </div>

    <h3>Color de fondo</h3>
    <div class="color-row">
      <label>Fondo</label>
      <input type="color" id="bg-color" value="#1a2a4a"/>
    </div>

    <h3>Escena de fondo</h3>
    <div class="scene-picker" id="scene-picker">
      <!-- chips built by JS -->
    </div>

    <button class="btn-toggle-scene" id="btn-toggle-scene">&#8854; Quitar de escena</button>
    <button class="btn-reset" id="btn-reset">&#128465; Resetear mu&#241;eco</button>

  </div><!-- /panel-right -->

</div><!-- /main -->

<!-- ====== BOTTOM SHEET (mobile) ====== -->
<div class="bottom-sheet-overlay" id="bottom-sheet-overlay"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="bottom-sheet-handle"><span></span></div>
  <div class="bottom-sheet-content" id="bottom-sheet-content">
    <!-- Panel content injected by JS on mobile -->
  </div>
</div>

<!-- ====== MOBILE SLOT BAR ====== -->
<div class="mobile-slot-bar" id="mobile-slot-bar">
  <!-- Slot tabs cloned/moved here by JS on mobile -->
</div>

<!-- ====== FOOTER ====== -->
<div class="footer-bar">
  <span class="footer-version">v2.5.1</span>
  <span class="footer-sep">·</span>
  <a href="https://github.com/davic80/munecos-kawaii"
     target="_blank" rel="noopener" class="footer-link">GitHub</a>
  <span class="footer-sep">·</span>
  <a href="https://www.paypal.com/donate/?hosted_button_id=7Z6JDTBCDCWHC"
     target="_blank" rel="noopener" class="footer-donate">invite me to a coffee ☕</a>
</div>

<script src="/static/app.js"></script>
</body>
</html>
